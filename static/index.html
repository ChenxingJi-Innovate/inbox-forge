<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inbox Forge · Email Summarizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          fontFamily: {
            sans: ['-apple-system','BlinkMacSystemFont','PingFang SC','Hiragino Kaku Gothic Pro','Segoe UI','Roboto','Helvetica Neue','Arial','sans-serif'],
            display: ['ui-serif',"'New York'","'Iowan Old Style'",'Georgia',"'Times New Roman'",'serif'],
            mono: ['SFMono-Medium','SF Mono','Menlo','Consolas','monospace'],
          },
          fontSize: {
            '100': ['12px', { lineHeight: '1.5' }],
            '200': ['14px', { lineHeight: '1.5' }],
            '300': ['16px', { lineHeight: '1.6' }],
            '400': ['20px', { lineHeight: '1.4' }],
            '500': ['28px', { lineHeight: '1.25' }],
            '600': ['36px', { lineHeight: '1.15' }],
          },
          fontWeight: { normal: '400', semibold: '600', bold: '700' },
          extend: {
            colors: {
              pushpin: { 0:'#FFF7F7', 50:'#FFEBEB', 100:'#FFE0E0', 200:'#FCBBBB', 300:'#F47171', 400:'#EB4242', 450:'#E60023', 500:'#CC0000', 600:'#B60000', 700:'#9B0000' },
              roboflow: { 50:'#F9F9F9', 100:'#F1F1F1', 200:'#E9E9E9', 300:'#CDCDCD', 400:'#A5A5A5', 500:'#767676', 600:'#4A4A4A', 700:'#2B2B2B', 800:'#191919' },
              cosmicore: '#111111',
              mochimalist: '#FFFFFF',
            },
            borderRadius: { '100':'4px','200':'8px','300':'12px','400':'16px','500':'20px','600':'24px','700':'28px','800':'32px', pill:'999px' },
            spacing: { '100':'4px','200':'8px','300':'12px','400':'16px','500':'20px','600':'24px','700':'28px','800':'32px','900':'36px','1000':'40px','1100':'44px','1200':'48px','1300':'52px','1400':'56px','1500':'60px','1600':'64px' },
            boxShadow: {
              floating: '0 1px 2px rgba(17,17,17,0.04), 0 8px 24px rgba(17,17,17,0.06), inset 0 1px 0 rgba(255,255,255,0.6)',
              raised:   '0 2px 4px rgba(17,17,17,0.06), 0 12px 32px rgba(17,17,17,0.08), inset 0 1px 0 rgba(255,255,255,0.7)',
              lift:     '0 4px 8px rgba(17,17,17,0.08), 0 24px 48px rgba(17,17,17,0.10), inset 0 1px 0 rgba(255,255,255,0.7)',
              glass:    '0 8px 32px rgba(17,17,17,0.06), inset 0 1px 0 rgba(255,255,255,0.8)',
            },
            transitionTimingFunction: { apple: 'cubic-bezier(0.16, 1, 0.3, 1)' },
            keyframes: {
              fadeUp: { '0%':{opacity:'0',transform:'translateY(12px)'},'100%':{opacity:'1',transform:'translateY(0)'} },
              shimmer: { '0%':{backgroundPosition:'-400px 0'},'100%':{backgroundPosition:'400px 0'} },
            },
            animation: {
              fadeUp: 'fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1)',
              shimmer: 'shimmer 1.4s linear infinite',
            },
          },
        },
      }
    </script>
    <style>
        html, body { background: #FAFAF7; }
        body {
          font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Kaku Gothic Pro", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
          color: #111111;
          -webkit-font-smoothing: antialiased;
        }
        .display-h1 { font-size: clamp(40px, 6.5vw, 72px); line-height: 1.05; letter-spacing: -0.04em; font-weight: 700; }
        .summary-box { font-size: 17px; line-height: 1.85; font-weight: 500; }
        .skeleton { background: linear-gradient(90deg, #F1F1F1 0%, #F9F9F9 40%, #F1F1F1 80%); background-size: 800px 100%; }
        .page-bg::before {
          content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
          background:
            radial-gradient(900px 500px at 85% -10%, rgba(230,0,35,0.05), transparent 60%),
            radial-gradient(700px 500px at -10% 110%, rgba(17,17,17,0.04), transparent 60%);
        }
        .step-num { font-family: ui-serif, "New York", "Iowan Old Style", Georgia, serif; font-style: italic; }
        select.tk-input {
          appearance: none;
          background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8' fill='none'><path d='M1 1.5L6 6.5L11 1.5' stroke='%23767676' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/></svg>");
          background-repeat: no-repeat; background-position: right 16px center; padding-right: 40px;
        }
        .tk-input {
          width: 100%; background: #FFFFFF; border: none;
          box-shadow: 0 1px 2px rgba(17,17,17,0.04), inset 0 0 0 1px #E9E9E9;
          border-radius: 16px; padding: 12px 16px; font-size: 14px; color: #111111;
          outline: none; transition: box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .tk-input::placeholder { color: #A5A5A5; }
        .tk-input:focus { box-shadow: 0 1px 2px rgba(17,17,17,0.04), inset 0 0 0 1.5px #E60023, 0 0 0 4px rgba(230,0,35,0.12); }
        .tk-input-pill { border-radius: 999px; padding-left: 20px; padding-right: 20px; }
        textarea.tk-input { line-height: 1.7; resize: vertical; }

        .source-tab[data-active="true"] { background:#111111; color:#fff; }
        .source-tab[data-active="false"] { background:transparent; color:#4A4A4A; }
    </style>
</head>
<body class="page-bg min-h-screen">

<div id="appView" class="relative z-10">

    <!-- Top bar -->
    <div class="sticky top-0 z-30 backdrop-blur-xl bg-mochimalist/70 border-b border-roboflow-100/80">
        <div class="max-w-5xl mx-auto px-600 py-400 flex items-center justify-between">
            <div class="flex items-center gap-300">
                <div class="w-800 h-800 rounded-200 bg-cosmicore flex items-center justify-center shadow-floating">
                    <svg class="w-400 h-400 text-mochimalist" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 7l8 5 8-5"/><rect x="4" y="5" width="16" height="14" rx="2"/>
                    </svg>
                </div>
                <div>
                    <div class="text-100 text-roboflow-500 tracking-widest uppercase leading-tight">Inbox Forge</div>
                    <div class="text-200 font-semibold text-cosmicore leading-tight" data-i18n="brand_tagline"></div>
                </div>
            </div>
            <div class="flex items-center gap-200 text-100">
                <div class="flex p-100 bg-roboflow-100 rounded-pill text-100">
                    <button class="lang-btn px-300 py-100 rounded-pill font-semibold transition-all duration-500 ease-apple" data-lang="en">EN</button>
                    <button class="lang-btn px-300 py-100 rounded-pill font-semibold transition-all duration-500 ease-apple" data-lang="zh">中</button>
                </div>
                <button id="navList" class="px-400 py-200 rounded-pill text-roboflow-700 hover:bg-roboflow-100 font-semibold transition-all duration-500 ease-apple" data-i18n="nav_records"></button>
                <button id="navHome" class="px-400 py-200 rounded-pill text-roboflow-700 hover:bg-roboflow-100 font-semibold transition-all duration-500 ease-apple hidden" data-i18n="nav_home"></button>
                <button id="navDownload" class="px-400 py-200 rounded-pill bg-cosmicore text-mochimalist font-semibold hover:-translate-y-0.5 hover:shadow-raised transition-all duration-500 ease-apple" data-i18n="nav_download"></button>
                <button id="navClear" class="px-300 py-200 rounded-pill text-roboflow-500 hover:text-pushpin-450 hover:bg-pushpin-50 transition-all duration-500 ease-apple" data-i18n="clear"></button>
            </div>
        </div>
    </div>

    <div class="max-w-5xl mx-auto px-600 pt-700 pb-1200">

        <!-- Hero -->
        <div id="heroBlock" class="mb-700 animate-fadeUp">
            <div class="text-100 text-pushpin-450 tracking-widest uppercase font-semibold mb-300">AI · Email · Excel</div>
            <h1 class="display-h1 text-cosmicore" data-i18n-html="hero_title"></h1>
            <p class="mt-500 text-300 text-roboflow-600 max-w-xl" data-i18n="hero_sub"></p>
            <p class="mt-300 text-100 text-roboflow-500 max-w-xl" data-i18n="hero_note"></p>
        </div>

        <!-- Health badge -->
        <div id="healthBadge" class="hidden mb-500 px-500 py-400 rounded-400 bg-pushpin-50 text-pushpin-700 text-200 font-semibold shadow-floating"></div>

        <!-- =============== HOME =============== -->
        <div id="homeView">

            <!-- Source tabs -->
            <div class="flex p-100 bg-mochimalist rounded-pill shadow-floating mb-500 max-w-md text-100">
                <button class="source-tab flex-1 py-300 px-400 rounded-pill font-semibold transition-all duration-500 ease-apple" data-source="upload" data-active="true" data-i18n="src_upload"></button>
                <button class="source-tab flex-1 py-300 px-400 rounded-pill font-semibold transition-all duration-500 ease-apple" data-source="text" data-active="false" data-i18n="src_text"></button>
                <button class="source-tab flex-1 py-300 px-400 rounded-pill font-semibold transition-all duration-500 ease-apple" data-source="inbox" data-active="false" data-i18n="src_inbox"></button>
            </div>

            <!-- Step indicator -->
            <div id="stepBar" class="flex items-center gap-200 mb-500 text-100">
                <span data-step="1" class="step-pill px-400 py-200 rounded-pill bg-cosmicore text-mochimalist font-semibold" data-i18n="step1"></span>
                <span class="h-100 w-600 bg-roboflow-200 rounded-pill"></span>
                <span data-step="2" class="step-pill px-400 py-200 rounded-pill bg-mochimalist/80 backdrop-blur-md text-roboflow-500 font-semibold shadow-glass" data-i18n="step2"></span>
                <span class="h-100 w-600 bg-roboflow-200 rounded-pill"></span>
                <span data-step="3" class="step-pill px-400 py-200 rounded-pill bg-mochimalist/80 backdrop-blur-md text-roboflow-500 font-semibold shadow-glass" data-i18n="step3"></span>
            </div>

            <!-- Step 1: Source -->
            <div id="step1" class="bg-mochimalist rounded-600 shadow-floating p-700 mb-500 animate-fadeUp">

                <!-- == Upload pane == -->
                <div data-pane="upload">
                    <div class="flex items-center gap-300 mb-500">
                        <span class="step-num text-500 text-pushpin-450">01.</span>
                        <h2 class="text-300 font-semibold text-cosmicore" data-i18n="upload_h"></h2>
                    </div>
                    <label class="block cursor-pointer">
                        <div id="dropZone" class="rounded-500 p-700 text-center bg-roboflow-50 hover:bg-pushpin-0 transition-all duration-500 ease-apple"
                             style="box-shadow: inset 0 0 0 1.5px #E9E9E9;">
                            <div class="w-1200 h-1200 rounded-pill bg-mochimalist mx-auto flex items-center justify-center shadow-floating mb-400">
                                <svg class="w-700 h-700 text-roboflow-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                                    <polyline points="17 8 12 3 7 8"/>
                                    <line x1="12" y1="3" x2="12" y2="15"/>
                                </svg>
                            </div>
                            <p class="text-300 text-cosmicore font-semibold" data-i18n-html="dropzone_main"></p>
                            <p class="text-100 text-roboflow-500 mt-200" data-i18n="dropzone_hint"></p>
                        </div>
                        <input type="file" id="fileInput" accept="image/*" multiple class="hidden">
                    </label>
                    <div id="thumbStrip" class="hidden mt-400 flex flex-wrap gap-300"></div>
                </div>

                <!-- == Text pane == -->
                <div data-pane="text" class="hidden">
                    <div class="flex items-center gap-300 mb-500">
                        <span class="step-num text-500 text-pushpin-450">01.</span>
                        <h2 class="text-300 font-semibold text-cosmicore" data-i18n="text_h"></h2>
                    </div>
                    <label class="block text-100 font-semibold text-roboflow-600 mb-200" data-i18n="paste_label"></label>
                    <textarea id="emailText" rows="10" class="tk-input"
                              style="border-radius:16px; padding:16px 20px;"
                              data-i18n-attr="placeholder:paste_placeholder"></textarea>
                    <p class="text-100 text-roboflow-400 mt-200" data-i18n="paste_hint"></p>
                </div>

                <!-- == Inbox pane == -->
                <div data-pane="inbox" class="hidden">
                    <div class="flex items-center gap-300 mb-500">
                        <span class="step-num text-500 text-pushpin-450">01.</span>
                        <h2 class="text-300 font-semibold text-cosmicore" data-i18n="inbox_h"></h2>
                    </div>
                    <div class="px-400 py-300 rounded-300 bg-roboflow-50 text-100 text-roboflow-600 mb-500 leading-relaxed">
                        <div class="font-semibold text-cosmicore mb-100" data-i18n="inbox_safety_h"></div>
                        <div data-i18n="inbox_safety_b"></div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-400">
                        <div>
                            <label class="block text-100 font-semibold text-roboflow-600 mb-200" data-i18n="email_label"></label>
                            <input type="email" id="imapEmail" autocomplete="email" class="tk-input" placeholder="you@gmail.com">
                        </div>
                        <div>
                            <label class="block text-100 font-semibold text-roboflow-600 mb-200" data-i18n="apppass_label"></label>
                            <input type="password" id="imapPass" autocomplete="off" class="tk-input" placeholder="xxxx xxxx xxxx xxxx">
                        </div>
                        <div>
                            <div class="flex items-baseline justify-between mb-200">
                                <label class="block text-100 font-semibold text-roboflow-600" data-i18n="host_label"></label>
                                <button type="button" id="hostHelpBtn" class="text-100 text-pushpin-450 hover:text-pushpin-600 font-semibold inline-flex items-center gap-100 transition-colors duration-500 ease-apple">
                                    <span data-i18n="host_help_link"></span>
                                    <svg class="w-300 h-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
                                </button>
                            </div>
                            <input type="text" id="imapHost" class="tk-input" placeholder="imap.gmail.com">
                            <p class="text-100 text-roboflow-400 mt-200" data-i18n="host_hint"></p>
                        </div>
                        <div>
                            <label class="block text-100 font-semibold text-roboflow-600 mb-200" data-i18n="limit_label"></label>
                            <input type="number" id="imapLimit" class="tk-input" min="1" max="20" value="5">
                        </div>
                    </div>

                    <!-- Provider reference panel (hidden by default) -->
                    <div id="hostHelpPanel" class="hidden mt-500 rounded-500 bg-roboflow-50 p-500 animate-fadeUp">
                        <div class="flex items-center justify-between mb-400">
                            <div class="text-200 font-semibold text-cosmicore" data-i18n="host_panel_h"></div>
                            <button type="button" id="hostHelpClose" class="w-700 h-700 rounded-pill bg-mochimalist text-roboflow-500 hover:text-pushpin-450 shadow-floating transition-colors duration-500 ease-apple flex items-center justify-center" aria-label="close">×</button>
                        </div>
                        <p class="text-100 text-roboflow-600 mb-400 leading-relaxed" data-i18n="host_panel_intro"></p>
                        <div class="overflow-x-auto rounded-300 bg-mochimalist shadow-floating">
                            <table class="w-full text-100" id="providerTable">
                                <thead>
                                    <tr class="text-roboflow-500 tracking-widest uppercase">
                                        <th class="text-left px-400 py-300 font-semibold" data-i18n="col_domain"></th>
                                        <th class="text-left px-400 py-300 font-semibold" data-i18n="col_host"></th>
                                        <th class="text-left px-400 py-300 font-semibold w-16" data-i18n="col_port"></th>
                                        <th class="text-left px-400 py-300 font-semibold" data-i18n="col_note"></th>
                                    </tr>
                                </thead>
                                <tbody class="text-cosmicore"></tbody>
                            </table>
                        </div>
                        <div class="mt-400 text-100 text-roboflow-500 leading-relaxed" data-i18n-html="host_panel_other"></div>
                    </div>

                    <button id="fetchBtn"
                            class="w-full mt-500 bg-cosmicore text-mochimalist py-400 rounded-pill font-semibold text-200 hover:-translate-y-0.5 hover:shadow-raised transition-all duration-500 ease-apple shadow-floating" data-i18n="fetch_btn"></button>

                    <div id="fetchResults" class="hidden mt-500"></div>
                </div>

                <!-- Analyze button is shared between upload + text -->
                <button id="analyzeBtn" disabled
                        class="w-full mt-500 bg-pushpin-450 text-mochimalist py-400 rounded-pill font-semibold text-200 disabled:bg-roboflow-200 disabled:text-roboflow-400 disabled:cursor-not-allowed disabled:hover:translate-y-0 hover:-translate-y-0.5 hover:shadow-raised transition-all duration-500 ease-apple shadow-floating" data-i18n="analyze_btn"></button>
            </div>

            <!-- Step 2: Review -->
            <div id="step2" class="hidden">

                <div class="bg-mochimalist rounded-600 shadow-lift p-700 mb-500 animate-fadeUp" style="box-shadow: 0 4px 8px rgba(17,17,17,0.08), 0 24px 48px rgba(17,17,17,0.10), inset 0 0 0 1.5px rgba(230,0,35,0.18);">
                    <div class="flex items-center justify-between mb-400">
                        <div class="flex items-center gap-300">
                            <span class="step-num text-500 text-pushpin-450">02.</span>
                            <h2 class="text-300 font-semibold text-cosmicore" data-i18n="summary_h"></h2>
                        </div>
                        <span class="text-100 text-roboflow-400 px-300 py-100 rounded-pill bg-roboflow-50" data-i18n="editable"></span>
                    </div>
                    <textarea id="summary" rows="9" class="summary-box tk-input"
                              style="background:#FAFAF7; border-radius:20px; padding:24px 28px;"
                              data-i18n-attr="placeholder:summary_placeholder"></textarea>
                </div>

                <div class="bg-mochimalist rounded-600 shadow-floating p-700 mb-500 animate-fadeUp">
                    <div class="flex items-center gap-300 mb-500">
                        <span class="step-num text-400 text-roboflow-400">03.</span>
                        <h3 class="text-200 font-semibold text-cosmicore tracking-wide" data-i18n="customer_h"></h3>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-400">
                        <div>
                            <label class="block text-100 font-semibold text-roboflow-600 mb-200" data-i18n-html="name_label"></label>
                            <input type="text" id="customerName" class="tk-input">
                        </div>
                        <div>
                            <label class="block text-100 font-semibold text-roboflow-600 mb-200" data-i18n="company_label"></label>
                            <input type="text" id="company" class="tk-input">
                        </div>
                        <div>
                            <label class="block text-100 font-semibold text-roboflow-600 mb-200" data-i18n-html="date_label"></label>
                            <input type="date" id="date" class="tk-input">
                        </div>
                        <div>
                            <label class="block text-100 font-semibold text-roboflow-600 mb-200" data-i18n="status_label"></label>
                            <select id="status" class="tk-input"></select>
                        </div>
                    </div>
                </div>

                <div class="bg-mochimalist rounded-600 shadow-floating p-700 mb-500 animate-fadeUp">
                    <div class="flex items-center gap-300 mb-400">
                        <span class="step-num text-400 text-roboflow-400">04.</span>
                        <h3 class="text-200 font-semibold text-cosmicore tracking-wide" data-i18n="action_h"></h3>
                    </div>
                    <textarea id="actionItems" rows="6" class="tk-input" style="border-radius:16px; padding:16px 20px;"></textarea>
                </div>

                <div class="flex gap-300 sticky bottom-500 backdrop-blur-xl bg-mochimalist/80 rounded-pill p-200 shadow-lift">
                    <button id="saveBtn"
                            class="flex-1 bg-cosmicore text-mochimalist py-400 rounded-pill font-semibold text-200 hover:-translate-y-0.5 hover:shadow-raised transition-all duration-500 ease-apple" data-i18n="save_btn"></button>
                    <button id="resetBtn"
                            class="px-700 py-400 bg-mochimalist text-roboflow-700 rounded-pill font-semibold text-200 hover:bg-roboflow-50 hover:-translate-y-0.5 transition-all duration-500 ease-apple shadow-floating" data-i18n="reset_btn"></button>
                </div>
            </div>

            <!-- Step 3: Success -->
            <div id="step3" class="hidden bg-mochimalist rounded-600 shadow-lift p-800 mb-500 animate-fadeUp" style="box-shadow: 0 4px 8px rgba(17,17,17,0.08), 0 24px 48px rgba(17,17,17,0.10), inset 0 0 0 1.5px rgba(230,0,35,0.18);">
                <div class="flex items-start gap-400">
                    <div class="w-1200 h-1200 bg-pushpin-450 rounded-pill flex items-center justify-center flex-shrink-0 shadow-raised">
                        <svg class="w-700 h-700 text-mochimalist" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>
                    </div>
                    <div class="flex-1 pt-200">
                        <div class="text-100 text-pushpin-450 font-semibold tracking-widest uppercase">Saved</div>
                        <h2 class="text-400 font-bold text-cosmicore mt-100" data-i18n="saved_h"></h2>
                        <p class="text-200 text-roboflow-600 mt-200" data-i18n="saved_sub"></p>
                    </div>
                </div>
                <div class="flex gap-300 mt-600">
                    <button id="doAnother" class="flex-1 bg-cosmicore text-mochimalist py-400 rounded-pill font-semibold text-200 hover:-translate-y-0.5 hover:shadow-raised transition-all duration-500 ease-apple" data-i18n="do_another"></button>
                    <button id="goListBtn" class="flex-1 bg-mochimalist text-roboflow-700 py-400 rounded-pill font-semibold text-200 hover:bg-roboflow-50 hover:-translate-y-0.5 transition-all duration-500 ease-apple shadow-floating" data-i18n="see_records"></button>
                </div>
            </div>
        </div>

        <!-- =============== LIST view =============== -->
        <div id="listView" class="hidden animate-fadeUp">
            <div class="flex items-end justify-between mb-500">
                <div>
                    <div class="text-100 text-pushpin-450 tracking-widest uppercase font-semibold">Archive</div>
                    <h2 class="text-500 font-bold text-cosmicore mt-100" data-i18n-html="archive_h"></h2>
                </div>
                <span id="recordCount" class="text-100 text-roboflow-500 px-400 py-200 rounded-pill bg-mochimalist shadow-floating"></span>
            </div>
            <div id="recordsList" class="grid gap-400"></div>
            <div id="recordsEmpty" class="hidden text-center py-1200 text-roboflow-400 text-200">
                <div class="w-1600 h-1600 rounded-pill bg-mochimalist mx-auto flex items-center justify-center shadow-floating mb-400">
                    <svg class="w-1000 h-1000 text-roboflow-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

const t = (key) => (I18N[state.lang] && I18N[state.lang][key]) || key;

const showToast = (msg, type='error') => {
    const el = $('toast');
    el.textContent = msg;
    const base = 'fixed top-600 right-600 px-500 py-400 rounded-pill shadow-lift max-w-md z-50 text-200 font-semibold backdrop-blur-xl';
    el.className = type === 'error' ? `${base} bg-pushpin-450/95 text-mochimalist` : `${base} bg-cosmicore/95 text-mochimalist`;
    el.classList.remove('hidden');
    setTimeout(()=>el.classList.add('hidden'), 3500);
};
const escapeHtml = (s) => String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function applyI18n() {
    document.documentElement.lang = state.lang === 'zh' ? 'zh-CN' : 'en';
    document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.getAttribute('data-i18n')); });
    document.querySelectorAll('[data-i18n-html]').forEach(el => { el.innerHTML = t(el.getAttribute('data-i18n-html')); });
    document.querySelectorAll('[data-i18n-attr]').forEach(el => {
        const spec = el.getAttribute('data-i18n-attr');
        spec.split(',').forEach(pair => {
            const [attr, key] = pair.split(':').map(s => s.trim());
            if (attr && key) el.setAttribute(attr, t(key));
        });
    });
    const sel = $('status');
    if (sel) {
        const prev = sel.value;
        const opts = t('status_options');
        sel.innerHTML = opts.map(o => `<option>${o}</option>`).join('');
        const otherLang = state.lang === 'en' ? 'zh' : 'en';
        const otherOpts = I18N[otherLang].status_options;
        const idx = otherOpts.indexOf(prev);
        if (idx >= 0) sel.value = opts[idx];
        else if (opts.includes(prev)) sel.value = prev;
    }
    document.querySelectorAll('.lang-btn').forEach(b => {
        const active = b.dataset.lang === state.lang;
        b.className = active
            ? 'lang-btn px-300 py-100 rounded-pill font-semibold transition-all duration-500 ease-apple bg-cosmicore text-mochimalist'
            : 'lang-btn px-300 py-100 rounded-pill font-semibold transition-all duration-500 ease-apple text-roboflow-500 hover:text-cosmicore';
    });
}
function setLang(lang) {
    state.lang = lang === 'zh' ? 'zh' : 'en';
    localStorage.setItem('lang', state.lang);
    applyI18n();
    if (!$('listView').classList.contains('hidden')) renderRecords();
}
document.addEventListener('click', (e) => {
    const lb = e.target.closest('.lang-btn'); if (lb) setLang(lb.dataset.lang);
    const tb = e.target.closest('.source-tab'); if (tb) setSource(tb.dataset.source);
});

// ---------- Source tabs ----------
function setSource(src) {
    state.source = src;
    document.querySelectorAll('.source-tab').forEach(b => b.dataset.active = String(b.dataset.source === src));
    document.querySelectorAll('[data-pane]').forEach(p => p.classList.toggle('hidden', p.dataset.pane !== src));
    // Analyze button hidden when on inbox pane
    $('analyzeBtn').classList.toggle('hidden', src === 'inbox');
    refreshAnalyzeBtn();
}

// ---------- Health ----------
async function checkHealth() {
    try {
        const h = await (await fetch('/api/health')).json();
        if (!h.gemini_key_set) {
            const b = $('healthBadge');
            b.textContent = state.lang === 'zh' ? '服务端未配置 GEMINI_API_KEY' : 'Server is missing GEMINI_API_KEY';
            b.classList.remove('hidden');
        }
    } catch (_) {}
}

$('navClear').addEventListener('click', () => {

    if (!confirm(t('toast_confirm_clear'))) return;
    state.records = []; persistRecords(); renderRecords(); showToast(t('toast_cleared'), 'success');
});

function showHome() {
    $('homeView').classList.remove('hidden');
    $('listView').classList.add('hidden');
    $('navList').classList.remove('hidden');
    $('navHome').classList.add('hidden');
}
function showList() {
    $('homeView').classList.add('hidden');
    $('listView').classList.remove('hidden');
    $('navList').classList.add('hidden');
    $('navHome').classList.remove('hidden');
    renderRecords();
}

// ---------- Records ----------
function renderRecords() {
    const list = $('recordsList');
    const empty = $('recordsEmpty');
    const records = state.records;
    $('recordCount').textContent = records.length ? t('record_count')(records.length) : '';
    if (!records.length) { list.innerHTML = ''; empty.classList.remove('hidden'); return; }
    empty.classList.add('hidden');
    list.innerHTML = records.map((r, i) => {
        const kind = (r.status === 'Done' || r.status === '已完成') ? 'done'
                    : (r.status === 'In progress' || r.status === '跟进中') ? 'progress'
                    : 'pending';
        const badge = kind === 'done' ? 'bg-pushpin-450 text-mochimalist'
                    : kind === 'progress' ? 'bg-cosmicore text-mochimalist'
                    : 'bg-roboflow-100 text-roboflow-700';
        return `
        <div class="bg-mochimalist rounded-500 shadow-floating p-600 hover:shadow-lift hover:-translate-y-0.5 transition-all duration-500 ease-apple">
            <div class="flex items-start justify-between gap-400 mb-300">
                <div class="min-w-0">
                    <div class="text-300 font-semibold text-cosmicore truncate">${escapeHtml(r.customer_name)}</div>
                    ${r.company ? `<div class="text-100 text-roboflow-500 mt-100">@ ${escapeHtml(r.company)}</div>` : ''}
                </div>
                <div class="flex items-center gap-200 text-100 flex-shrink-0">
                    <span class="text-roboflow-400 font-mono">${escapeHtml(r.date)}</span>
                    <span class="px-300 py-100 rounded-pill font-semibold ${badge}">${escapeHtml(r.status || t('status_pending_default'))}</span>
                    <button class="del-rec text-roboflow-400 hover:text-pushpin-450 px-200 transition-colors duration-500 ease-apple" data-idx="${i}" aria-label="delete">×</button>
                </div>
            </div>
            <div class="text-200 text-roboflow-700 leading-relaxed whitespace-pre-wrap">${escapeHtml(r.summary)}</div>
            ${r.action_items ? `<div class="mt-400 pt-400 text-100 text-roboflow-600 whitespace-pre-wrap" style="border-top:1px solid #F1F1F1;"><span class="text-pushpin-450 font-semibold tracking-widest uppercase mr-200">${escapeHtml(t('todo_label'))}</span>${escapeHtml(r.action_items)}</div>` : ''}
        </div>`;
    }).join('');
    list.querySelectorAll('.del-rec').forEach(btn => {
        btn.addEventListener('click', () => {
            const i = Number(btn.dataset.idx);
            state.records.splice(i, 1); persistRecords(); renderRecords();
        });
    });
}

async function downloadExcel() {
    if (!state.records.length) { showToast(t('toast_no_records')); return; }
    $('loading').classList.remove('hidden');
    $('loadingText').textContent = t('loading_excel');
    try {
        const res = await fetch('/api/excel', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ records: state.records, lang: state.lang }),
        });
        if (!res.ok) {
            const j = await res.json().catch(()=>({detail:'failed'}));
            throw new Error(j.detail || 'failed');
        }
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = state.lang === 'zh' ? 'email_records_zh.xlsx' : 'email_records_en.xlsx';
        document.body.appendChild(a); a.click(); a.remove();
        URL.revokeObjectURL(url);
    } catch (e) {
        showToast(String(e.message || e));
    } finally {
        $('loading').classList.add('hidden');
    }
}

// ---------- Upload + thumbnails ----------
$('date').valueAsDate = new Date();
const MAX_FILES = 8;
const MAX_TOTAL = 40 * 1024 * 1024;

function refreshAnalyzeBtn() {
    if (state.source === 'inbox') { $('analyzeBtn').disabled = true; return; }
    const hasImages = state.fileBlobs.length > 0;
    const hasText = $('emailText').value.trim().length > 0;
    $('analyzeBtn').disabled = !(hasImages || hasText);
}

function renderThumbs() {
    const strip = $('thumbStrip');
    if (state.fileBlobs.length === 0) { strip.classList.add('hidden'); strip.innerHTML = ''; return; }
    strip.classList.remove('hidden');
    strip.innerHTML = state.fileBlobs.map((f, i) => `
        <div class="relative group" data-idx="${i}" style="width:128px;">
            <img src="${URL.createObjectURL(f)}" class="w-full h-32 object-cover rounded-300 shadow-floating">
            <button type="button" class="thumb-del absolute -top-200 -right-200 w-700 h-700 rounded-pill bg-cosmicore text-mochimalist text-200 font-bold flex items-center justify-center shadow-raised hover:bg-pushpin-450 transition-all duration-500 ease-apple" aria-label="remove">×</button>
            <div class="text-100 text-roboflow-500 mt-200 truncate">${escapeHtml(f.name)}</div>
            <div class="text-100 text-roboflow-400">${(f.size/1024).toFixed(0)} KB</div>
        </div>`).join('') + `
        <div class="text-100 text-roboflow-500 self-end px-300 py-200 rounded-pill bg-roboflow-50">
            ${escapeHtml(t('shot_count')(state.fileBlobs.length))}
        </div>`;
    strip.querySelectorAll('.thumb-del').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.preventDefault();
            const idx = Number(btn.closest('[data-idx]').dataset.idx);
            state.fileBlobs.splice(idx, 1);
            renderThumbs(); refreshAnalyzeBtn();
        });
    });
}

function addFiles(files) {
    let total = state.fileBlobs.reduce((s, f) => s + f.size, 0);
    for (const f of files) {
        if (!f.type.startsWith('image/')) { showToast(t('toast_need_image')); continue; }
        if (state.fileBlobs.length >= MAX_FILES) { showToast(`Max ${MAX_FILES} screenshots`); break; }
        if (total + f.size > MAX_TOTAL) { showToast('Total size exceeds 40 MB'); break; }
        state.fileBlobs.push(f); total += f.size;
    }
    renderThumbs(); refreshAnalyzeBtn();
}

$('fileInput').addEventListener('change', (e) => { addFiles(Array.from(e.target.files || [])); e.target.value = ''; });
$('emailText').addEventListener('input', refreshAnalyzeBtn);

const dz = $('dropZone');
['dragenter','dragover'].forEach(ev => dz.addEventListener(ev, (e)=>{e.preventDefault(); dz.style.boxShadow='inset 0 0 0 2px #E60023'; dz.classList.add('bg-pushpin-0');}));
['dragleave','drop'].forEach(ev => dz.addEventListener(ev, (e)=>{e.preventDefault(); dz.style.boxShadow='inset 0 0 0 1.5px #E9E9E9'; dz.classList.remove('bg-pushpin-0');}));
dz.addEventListener('drop', (e) => { e.preventDefault(); addFiles(Array.from(e.dataTransfer.files || [])); });

document.addEventListener('paste', (e) => {
    if (state.source !== 'upload') return;
    if (document.activeElement === $('emailText')) return;
    const items = e.clipboardData?.items || [];
    const imgs = [];
    for (const item of items) {
        if (item.type.startsWith('image/')) {
            const f = item.getAsFile(); if (f) imgs.push(f);
        }
    }
    if (imgs.length) { addFiles(imgs); showToast(t('toast_pasted'), 'success'); }
});

    { domains: ['qq.com', 'foxmail.com'], host: 'imap.qq.com', port: 993, note: 'auth_code' },
    { domains: ['163.com'], host: 'imap.163.com', port: 993, note: 'auth_code' },
    { domains: ['126.com'], host: 'imap.126.com', port: 993, note: 'auth_code' },
    { domains: ['sina.com'], host: 'imap.sina.com', port: 993, note: 'auth_code' },
];
const NOTE_COPY = {
    en: {
        app_pass:    { label: 'App password', tone: 'ok' },
        auth_code:   { label: 'Authorization code', tone: 'ok' },
        outlook_dead:{ label: 'IMAP disabled by Microsoft (Sept 2024). Use OAuth.', tone: 'bad' },
        org_only:    { label: 'Org admin must enable IMAP', tone: 'warn' },
    },
    zh: {
        app_pass:    { label: '需应用专用密码', tone: 'ok' },
        auth_code:   { label: '需邮箱授权码', tone: 'ok' },
        outlook_dead:{ label: '微软已停用 IMAP (2024.9),需 OAuth', tone: 'bad' },
        org_only:    { label: '需组织管理员开启 IMAP', tone: 'warn' },
    },
};
function renderProviderTable() {
    const tbody = document.querySelector('#providerTable tbody');
    if (!tbody) return;
    const copy = NOTE_COPY[state.lang];
    tbody.innerHTML = PROVIDER_ROWS.map(r => {
        const c = copy[r.note] || { label: '', tone: 'ok' };
        const toneCls = c.tone === 'bad' ? 'bg-pushpin-50 text-pushpin-700'
                      : c.tone === 'warn' ? 'bg-roboflow-100 text-roboflow-700'
                      : 'bg-roboflow-50 text-roboflow-600';
        const rowCls = r.note === 'outlook_dead' ? 'opacity-70 line-through decoration-pushpin-450/40' : '';
        return `
        <tr class="border-t border-roboflow-100 ${rowCls}">
            <td class="px-400 py-300 font-mono text-200">${r.domains.map(d => `@${d}`).join(' · ')}</td>
            <td class="px-400 py-300 font-mono text-200">${r.host}</td>
            <td class="px-400 py-300 font-mono text-roboflow-500">${r.port}</td>
            <td class="px-400 py-300"><span class="text-100 font-semibold px-300 py-100 rounded-pill ${toneCls}">${c.label}</span></td>
        </tr>`;
    }).join('');
}
$('hostHelpBtn').addEventListener('click', () => {
    const panel = $('hostHelpPanel');
    const open = panel.classList.contains('hidden');
    if (open) { renderProviderTable(); panel.classList.remove('hidden'); }
    else panel.classList.add('hidden');
});
$('hostHelpClose').addEventListener('click', () => $('hostHelpPanel').classList.add('hidden'));

// ---------- IMAP fetch ----------
$('imapEmail').addEventListener('input', () => {
    const v = $('imapEmail').value.trim().toLowerCase();
    if (!v.includes('@') || $('imapHost').value) return;
    const map = {
        'gmail.com':'imap.gmail.com','googlemail.com':'imap.gmail.com',
        'outlook.com':'outlook.office365.com','hotmail.com':'outlook.office365.com','live.com':'outlook.office365.com',
        'icloud.com':'imap.mail.me.com','me.com':'imap.mail.me.com',
        'yahoo.com':'imap.mail.yahoo.com',
        'qq.com':'imap.qq.com','foxmail.com':'imap.qq.com',
        '163.com':'imap.163.com','126.com':'imap.126.com','sina.com':'imap.sina.com',
    };
    const dom = v.split('@')[1] || ''; if (map[dom]) $('imapHost').placeholder = map[dom];
});

$('fetchBtn').addEventListener('click', async () => {
    const email = $('imapEmail').value.trim();
    const password = $('imapPass').value;
    const host = $('imapHost').value.trim() || null;
    const limit = Math.max(1, Math.min(20, Number($('imapLimit').value) || 5));
    if (!email || !password) { showToast(t('toast_need_name')); return; }
    $('loading').classList.remove('hidden');
    $('loadingText').textContent = t('loading_fetch');
    try {
        const res = await fetch('/api/fetch-emails', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password, host, limit }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Fetch failed');
        state.fetched = data.emails || [];
        renderFetched();
        if (!state.fetched.length) showToast(t('toast_no_emails'));
    } catch (e) {
        showToast(String(e.message || e));
    } finally {
        $('loading').classList.add('hidden');
    }
});

function renderFetched() {
    const box = $('fetchResults');
    if (!state.fetched.length) { box.classList.add('hidden'); box.innerHTML = ''; return; }
    box.classList.remove('hidden');
    box.innerHTML = `
        <div class="text-100 font-semibold text-roboflow-600 tracking-widest uppercase mb-300">${state.fetched.length} unread</div>
        <div class="grid gap-300">` + state.fetched.map((m, i) => `
            <button data-idx="${i}" class="fetched-item text-left bg-roboflow-50 hover:bg-pushpin-0 rounded-400 p-400 transition-all duration-500 ease-apple">
                <div class="flex items-center justify-between gap-300 mb-200">
                    <div class="text-200 font-semibold text-cosmicore truncate">${escapeHtml(m.subject || '(no subject)')}</div>
                    <div class="text-100 text-roboflow-400 font-mono whitespace-nowrap">${escapeHtml(m.date || '')}</div>
                </div>
                <div class="text-100 text-roboflow-500 truncate">${escapeHtml(m.from_name || m.from_addr || '')} · ${escapeHtml((m.body || '').slice(0, 120))}</div>
            </button>`).join('') + `</div>`;
    box.querySelectorAll('.fetched-item').forEach(btn => {
        btn.addEventListener('click', () => analyzeFetched(Number(btn.dataset.idx)));
    });
}

async function analyzeFetched(idx) {
    const m = state.fetched[idx]; if (!m) return;
    $('loading').classList.remove('hidden');
    $('loadingText').textContent = t('loading_analyze');
    const fd = new FormData();
    const composed = `Subject: ${m.subject}\nFrom: ${m.from_name} <${m.from_addr}>\nDate: ${m.date}\n\n${m.body}`;
    fd.append('text', composed);
    fd.append('lang', state.lang);
    try {
        const res = await fetch('/api/analyze', { method: 'POST', body: fd });
        const data = await res.json();
        if (!res.ok || !data.success) throw new Error(data.detail || 'Analyze failed');
        applyAnalysis(data, m.from_name || m.from_addr || '', '');
    } catch (e) {
        showToast(String(e.message || e));
    } finally {
        $('loading').classList.add('hidden');
    }
}

// ---------- Analyze (upload + text) ----------
$('analyzeBtn').addEventListener('click', async () => {
    const text = $('emailText').value.trim();
    if (state.fileBlobs.length === 0 && !text) return;
    $('loading').classList.remove('hidden');
    $('loadingText').textContent = t('loading_analyze');
    const fd = new FormData();
    state.fileBlobs.forEach(f => fd.append('files', f));
    fd.append('text', text);
    fd.append('lang', state.lang);
    try {
        const res = await fetch('/api/analyze', { method: 'POST', body: fd });
        const data = await res.json();
        if (!res.ok || !data.success) throw new Error(data.detail || 'Analyze failed');
        applyAnalysis(data);
    } catch (e) {
        showToast(String(e.message || e));
    } finally {
        $('loading').classList.add('hidden');
    }
});

function applyAnalysis(data) {
    $('customerName').value = data.sender || '';
    $('company').value = data.company || '';
    $('summary').value = data.summary || '';
    $('actionItems').value = data.action_items || '';
    $('step1').classList.add('hidden');
    $('step2').classList.remove('hidden');
    setStep(2);
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function setStep(n) {
    document.querySelectorAll('#stepBar .step-pill').forEach(el => {
        const s = Number(el.dataset.step);
        if (s === n)      el.className = 'step-pill px-400 py-200 rounded-pill bg-cosmicore text-mochimalist font-semibold';
        else if (s < n)   el.className = 'step-pill px-400 py-200 rounded-pill bg-pushpin-450 text-mochimalist font-semibold';
        else              el.className = 'step-pill px-400 py-200 rounded-pill bg-mochimalist/80 backdrop-blur-md text-roboflow-500 font-semibold shadow-glass';
    });
}

// ---------- Save ----------
$('saveBtn').addEventListener('click', () => {
    const name = $('customerName').value.trim();
    if (!name) { showToast(t('toast_need_name')); $('customerName').focus(); return; }
    const rec = {
        customer_name: name,
        company: $('company').value.trim(),
        date: $('date').value,
        summary: $('summary').value,
        action_items: $('actionItems').value,
        status: $('status').value,
        created_at: new Date().toISOString().slice(0, 19).replace('T', ' '),
    };
    state.records.unshift(rec);
    persistRecords();
    $('step2').classList.add('hidden');
    $('step3').classList.remove('hidden');
    setStep(3);
    window.scrollTo({ top: 0, behavior: 'smooth' });
});

function reset() {
    state.fileBlobs = [];
    $('fileInput').value = '';
    renderThumbs();
    $('emailText').value = '';
    $('customerName').value = '';
    $('company').value = '';
    $('summary').value = '';
    $('actionItems').value = '';
    $('date').valueAsDate = new Date();
    $('analyzeBtn').disabled = true;
    $('step1').classList.remove('hidden');
    $('step2').classList.add('hidden');
    $('step3').classList.add('hidden');
    setStep(1);
    window.scrollTo({ top: 0, behavior: 'smooth' });
}
$('resetBtn').addEventListener('click', reset);
$('doAnother').addEventListener('click', reset);
$('goListBtn').addEventListener('click', () => { reset(); showList(); });

// ---------- Boot ----------
applyI18n();
setSource('upload');
checkHealth();
</script>

</body>
</html>
