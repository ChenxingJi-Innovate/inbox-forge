<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inbox Forge · 个人邮件档案</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      fontFamily: {
        sans: ['-apple-system','BlinkMacSystemFont','PingFang SC','Hiragino Kaku Gothic Pro','Segoe UI','Roboto','Helvetica Neue','Arial','sans-serif'],
        display: ['ui-serif',"'New York'","'Iowan Old Style'",'Georgia',"'Times New Roman'",'serif'],
        mono: ['SFMono-Medium','SF Mono','Menlo','Consolas','monospace'],
      },
      fontSize: {
        '100': ['12px', { lineHeight: '1.5' }],
        '200': ['14px', { lineHeight: '1.5' }],
        '300': ['16px', { lineHeight: '1.6' }],
        '400': ['20px', { lineHeight: '1.4' }],
        '500': ['28px', { lineHeight: '1.25' }],
        '600': ['36px', { lineHeight: '1.15' }],
      },
      fontWeight: { normal:'400', semibold:'600', bold:'700' },
      extend: {
        colors: {
          pushpin: { 0:'#FFF7F7', 50:'#FFEBEB', 100:'#FFE0E0', 200:'#FCBBBB', 300:'#F47171', 400:'#EB4242', 450:'#E60023', 500:'#CC0000', 600:'#B60000', 700:'#9B0000' },
          roboflow: { 50:'#F9F9F9', 100:'#F1F1F1', 200:'#E9E9E9', 300:'#CDCDCD', 400:'#A5A5A5', 500:'#767676', 600:'#4A4A4A', 700:'#2B2B2B', 800:'#191919' },
          cosmicore: '#111111',
          mochimalist: '#FFFFFF',
        },
        borderRadius: { '100':'4px','200':'8px','300':'12px','400':'16px','500':'20px','600':'24px','700':'28px','800':'32px', pill:'999px' },
        spacing: { '100':'4px','200':'8px','300':'12px','400':'16px','500':'20px','600':'24px','700':'28px','800':'32px','900':'36px','1000':'40px','1100':'44px','1200':'48px','1300':'52px','1400':'56px','1500':'60px','1600':'64px' },
        boxShadow: {
          floating: '0 1px 2px rgba(17,17,17,0.04), 0 8px 24px rgba(17,17,17,0.06), inset 0 1px 0 rgba(255,255,255,0.6)',
          raised:   '0 2px 4px rgba(17,17,17,0.06), 0 12px 32px rgba(17,17,17,0.08), inset 0 1px 0 rgba(255,255,255,0.7)',
          lift:     '0 4px 8px rgba(17,17,17,0.08), 0 24px 48px rgba(17,17,17,0.10), inset 0 1px 0 rgba(255,255,255,0.7)',
          glass:    '0 8px 32px rgba(17,17,17,0.06), inset 0 1px 0 rgba(255,255,255,0.8)',
        },
        transitionTimingFunction: { apple: 'cubic-bezier(0.16, 1, 0.3, 1)' },
        keyframes: {
          fadeUp:  { '0%':{opacity:'0',transform:'translateY(12px)'}, '100%':{opacity:'1',transform:'translateY(0)'} },
          shimmer: { '0%':{backgroundPosition:'-400px 0'}, '100%':{backgroundPosition:'400px 0'} },
        },
        animation: {
          fadeUp:  'fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1)',
          shimmer: 'shimmer 1.4s linear infinite',
        },
      },
    },
  };
</script>
<style>
  html, body { background: #FAFAF7; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Kaku Gothic Pro", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color: #111111;
    -webkit-font-smoothing: antialiased;
  }
  .display-h1 { font-size: clamp(36px, 5.5vw, 56px); line-height: 1.05; letter-spacing: -0.04em; font-weight: 700; }
  .skeleton { background: linear-gradient(90deg, #F1F1F1 0%, #F9F9F9 40%, #F1F1F1 80%); background-size: 800px 100%; }
  .page-bg::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(900px 500px at 85% -10%, rgba(230,0,35,0.05), transparent 60%),
      radial-gradient(700px 500px at -10% 110%, rgba(17,17,17,0.04), transparent 60%);
  }
  .step-num { font-family: ui-serif, "New York", "Iowan Old Style", Georgia, serif; font-style: italic; }
  .contact-row[data-active="true"] { background:#111111; color:#FFFFFF; }
  .contact-row[data-active="true"] .row-meta { color:#A5A5A5; }
  .contact-row[data-active="true"] .row-preview { color:#CDCDCD; }
  .stage-pill { font-size: 12px; padding: 2px 10px; border-radius: 999px; font-weight: 600; }
  .stage-在谈, .stage-In.discussion { background:#FFE0E0; color:#9B0000; }
  .stage-已合作, .stage-Active { background:#E0F2E9; color:#0F6B3E; }
  .stage-初识, .stage-New { background:#F1F1F1; color:#4A4A4A; }
  .stage-已结束, .stage-Closed { background:#E9E9E9; color:#767676; }
  .scroll-y { overflow-y: auto; }
  .scroll-y::-webkit-scrollbar { width: 8px; }
  .scroll-y::-webkit-scrollbar-thumb { background: #E9E9E9; border-radius: 99px; }
</style>
</head>
<body class="page-bg min-h-screen">

<!-- ──────────── TOP BAR ──────────── -->
<div class="sticky top-0 z-30 backdrop-blur-xl bg-mochimalist/70 border-b border-roboflow-100/80">
  <div class="max-w-7xl mx-auto px-600 py-400 flex items-center justify-between">
    <div class="flex items-center gap-300">
      <div class="w-800 h-800 rounded-200 bg-cosmicore flex items-center justify-center shadow-floating">
        <svg class="w-400 h-400 text-mochimalist" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 7l8 5 8-5"/><rect x="4" y="5" width="16" height="14" rx="2"/>
        </svg>
      </div>
      <div>
        <div class="text-100 text-roboflow-500 tracking-widest uppercase leading-tight">Inbox Forge</div>
        <div class="text-200 font-semibold text-cosmicore leading-tight" data-i18n="tagline"></div>
      </div>
    </div>
    <div class="flex items-center gap-200 text-100">
      <div class="flex p-100 bg-roboflow-100 rounded-pill">
        <button class="lang-btn px-300 py-100 rounded-pill font-semibold transition-all duration-500 ease-apple" data-lang="zh">中</button>
        <button class="lang-btn px-300 py-100 rounded-pill font-semibold transition-all duration-500 ease-apple" data-lang="en">EN</button>
      </div>
      <button id="connectGoogle" class="px-400 py-200 rounded-pill bg-mochimalist text-roboflow-700 font-semibold shadow-floating hover:-translate-y-0.5 hover:shadow-raised transition-all duration-500 ease-apple flex items-center gap-200">
        <svg class="w-400 h-400" viewBox="0 0 24 24"><path fill="#4285F4" d="M21.35 11.1h-9.17v2.73h6.51c-.33 3.81-3.5 5.44-6.5 5.44C8.36 19.27 5 16.25 5 12c0-4.1 3.2-7.27 7.2-7.27 3.09 0 4.9 1.97 4.9 1.97L19 4.72S16.56 2 12.1 2C6.42 2 2.03 6.8 2.03 12c0 5.05 4.13 10 10.22 10 5.35 0 9.25-3.67 9.25-9.09 0-1.15-.15-1.81-.15-1.81z"/></svg>
        <span data-i18n="connect_gmail"></span>
      </button>
      <button id="connectMicrosoft" class="px-400 py-200 rounded-pill bg-mochimalist text-roboflow-700 font-semibold shadow-floating hover:-translate-y-0.5 hover:shadow-raised transition-all duration-500 ease-apple flex items-center gap-200">
        <svg class="w-400 h-400" viewBox="0 0 23 23"><path fill="#F25022" d="M1 1h10v10H1z"/><path fill="#7FBA00" d="M12 1h10v10H12z"/><path fill="#00A4EF" d="M1 12h10v10H1z"/><path fill="#FFB900" d="M12 12h10v10H12z"/></svg>
        <span data-i18n="connect_outlook"></span>
      </button>
    </div>
  </div>
</div>

<!-- ──────────── EMPTY STATE (no connections + no contacts) ──────────── -->
<div id="emptyState" class="relative z-10 hidden max-w-3xl mx-auto px-600 pt-1200 pb-1200 animate-fadeUp">
  <div class="text-100 text-pushpin-450 tracking-widest uppercase font-semibold mb-300" data-i18n="local_badge"></div>
  <h1 class="display-h1 text-cosmicore" data-i18n-html="hero_title"></h1>
  <p class="mt-500 text-300 text-roboflow-600 max-w-xl" data-i18n="hero_sub"></p>
  <div class="mt-700 flex flex-col sm:flex-row gap-300">
    <button class="hero-google flex-1 inline-flex items-center justify-center gap-300 bg-mochimalist py-400 rounded-pill font-semibold text-200 shadow-floating hover:-translate-y-0.5 hover:shadow-raised transition-all duration-500 ease-apple">
      <svg class="w-500 h-500" viewBox="0 0 24 24"><path fill="#4285F4" d="M21.35 11.1h-9.17v2.73h6.51c-.33 3.81-3.5 5.44-6.5 5.44C8.36 19.27 5 16.25 5 12c0-4.1 3.2-7.27 7.2-7.27 3.09 0 4.9 1.97 4.9 1.97L19 4.72S16.56 2 12.1 2C6.42 2 2.03 6.8 2.03 12c0 5.05 4.13 10 10.22 10 5.35 0 9.25-3.67 9.25-9.09 0-1.15-.15-1.81-.15-1.81z"/></svg>
      <span data-i18n="connect_gmail"></span>
    </button>
    <button class="hero-microsoft flex-1 inline-flex items-center justify-center gap-300 bg-mochimalist py-400 rounded-pill font-semibold text-200 shadow-floating hover:-translate-y-0.5 hover:shadow-raised transition-all duration-500 ease-apple">
      <svg class="w-500 h-500" viewBox="0 0 23 23"><path fill="#F25022" d="M1 1h10v10H1z"/><path fill="#7FBA00" d="M12 1h10v10H12z"/><path fill="#00A4EF" d="M1 12h10v10H12z"/><path fill="#FFB900" d="M12 12h10v10H12z"/></svg>
      <span data-i18n="connect_outlook"></span>
    </button>
  </div>
  <p class="mt-500 text-100 text-roboflow-400 leading-relaxed" data-i18n="local_promise"></p>
</div>

<!-- ──────────── MAIN: TWO-PANE ──────────── -->
<div id="mainView" class="relative z-10 hidden max-w-7xl mx-auto px-600 pt-500 pb-1200">

  <!-- header row: connections + sweep -->
  <div id="connBar" class="flex flex-wrap items-center gap-300 mb-500"></div>

  <div class="grid gap-500" style="grid-template-columns: 360px 1fr;">

    <!-- ───── LEFT: contact list ───── -->
    <aside class="bg-mochimalist rounded-600 shadow-floating p-500 h-[calc(100vh-180px)] flex flex-col">
      <div class="flex items-baseline justify-between mb-400 px-200">
        <div>
          <div class="text-100 text-pushpin-450 font-semibold tracking-widest uppercase" data-i18n="contacts_kicker"></div>
          <div id="contactCount" class="text-300 font-semibold text-cosmicore mt-100"></div>
        </div>
      </div>
      <div id="contactList" class="space-y-200 scroll-y flex-1 pr-200"></div>
      <div id="contactListEmpty" class="hidden flex-1 flex items-center justify-center text-roboflow-400 text-100 text-center px-400">
        <span data-i18n="contacts_empty"></span>
      </div>
    </aside>

    <!-- ───── RIGHT: dossier + timeline ───── -->
    <section class="space-y-500">

      <!-- placeholder when nothing selected -->
      <div id="selectHint" class="bg-mochimalist rounded-600 shadow-floating p-1200 text-center">
        <div class="w-1600 h-1600 rounded-pill bg-roboflow-50 mx-auto flex items-center justify-center mb-400">
          <svg class="w-1000 h-1000 text-roboflow-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="4"/><path d="M4 21v-2a4 4 0 0 1 4-4h8a4 4 0 0 1 4 4v2"/>
          </svg>
        </div>
        <p class="text-200 text-roboflow-500" data-i18n="select_hint"></p>
      </div>

      <div id="detail" class="hidden space-y-500"></div>
    </section>
  </div>
</div>

<!-- toast + loading -->
<div id="loading" class="hidden fixed inset-0 bg-cosmicore/30 backdrop-blur-md flex items-center justify-center z-50">
  <div class="bg-mochimalist rounded-500 p-700 shadow-lift min-w-[320px] animate-fadeUp">
    <div class="space-y-300">
      <div class="skeleton animate-shimmer h-400 w-3/4 rounded-pill"></div>
      <div class="skeleton animate-shimmer h-300 w-full rounded-pill"></div>
      <div class="skeleton animate-shimmer h-300 w-5/6 rounded-pill"></div>
    </div>
    <p id="loadingText" class="mt-500 text-200 text-roboflow-600 font-semibold"></p>
  </div>
</div>
<div id="toast" class="hidden fixed top-600 right-600 px-500 py-400 rounded-pill shadow-lift max-w-md z-50 text-200 font-semibold backdrop-blur-xl"></div>

<script>
const $ = (id) => document.getElementById(id);

const state = {
  lang: (localStorage.getItem('lang') || 'zh').toLowerCase() === 'en' ? 'en' : 'zh',
  connections: [],
  contacts: [],
  selectedId: null,
  detailCache: {},
};

// ───────── i18n ─────────
const I18N = {
  zh: {
    tagline: '本地档案 · AI 摘要',
    connect_gmail: '连接 Gmail',
    connect_outlook: '连接 Outlook',
    local_badge: '本地优先 · 你的数据不离开这台机器',
    hero_title: '把每封邮件,<br>沉淀成<span class="font-display italic text-pushpin-450">人</span>的档案。',
    hero_sub: '连接你的邮箱后,Gemini 会自动总结每封邮件,并按发件人归档。每次新邮件来,档案会滚动更新,不会失忆。',
    local_promise: '所有数据存在 ~/.inbox-forge/data.db。OAuth token 加密保存。需要时随时清空。',
    contacts_kicker: '联系人',
    contacts_empty: '尚无联系人。点击右上角「同步」从邮箱拉取未读邮件,系统会自动归档。',
    select_hint: '从左侧选一位联系人,查看档案与历史邮件。',
    sync_now: '同步未读',
    syncing: '正在拉取并总结...',
    no_new: '没有新邮件',
    synced_n: '已处理 {n} 封新邮件',
    skipped_n: '(跳过 {n} 封已记录)',
    failed_n: ', {n} 封失败',
    disconnect: '断开',
    disconnect_confirm: '确定要断开这个邮箱吗? 不会影响已归档的联系人档案。',
    delete_contact: '删除联系人',
    delete_contact_confirm: '确定删除这位联系人? 他的所有历史邮件与档案都会一并删除,不可恢复。',
    delete_email: '删除这封',
    delete_email_confirm: '确定从档案里删掉这封邮件?',
    dossier_h: '档案',
    timeline_h: '邮件时间线',
    relationship: '关系阶段',
    current_topic: '当前主题',
    rolling_summary: '档案摘要',
    open_items: '未完成事项',
    none_yet: '尚无内容',
    new_contact: '初识',
    open_link_gmail: '在 Gmail 中查看',
    open_link_outlook: '在 Outlook 中查看',
    emails_count: '{n} 封邮件',
    last_seen: '最近 {t}',
  },
  en: {
    tagline: 'Local-first · AI dossiers',
    connect_gmail: 'Connect Gmail',
    connect_outlook: 'Connect Outlook',
    local_badge: 'Local-first · your data never leaves this machine',
    hero_title: 'Every email,<br>distilled into a <span class="font-display italic text-pushpin-450">person.</span>',
    hero_sub: 'Connect your inbox and Gemini summarizes every email, filed by sender. Each new email rolls into a living dossier, so context never gets lost.',
    local_promise: 'All data lives in ~/.inbox-forge/data.db. OAuth tokens encrypted at rest. Wipe anytime.',
    contacts_kicker: 'Contacts',
    contacts_empty: 'No contacts yet. Hit Sync above to pull unread mail and auto-file.',
    select_hint: 'Pick a contact on the left to see their dossier and timeline.',
    sync_now: 'Sync unread',
    syncing: 'Pulling and summarizing...',
    no_new: 'Nothing new',
    synced_n: 'Processed {n} new email(s)',
    skipped_n: ' (skipped {n} already filed)',
    failed_n: ', {n} failed',
    disconnect: 'Disconnect',
    disconnect_confirm: 'Disconnect this inbox? Your existing contact dossiers stay intact.',
    delete_contact: 'Delete contact',
    delete_contact_confirm: 'Delete this contact? All their emails and dossier go with them. Cannot be undone.',
    delete_email: 'Delete',
    delete_email_confirm: 'Remove this email from the archive?',
    dossier_h: 'Dossier',
    timeline_h: 'Timeline',
    relationship: 'Relationship',
    current_topic: 'Current topic',
    rolling_summary: 'Rolling summary',
    open_items: 'Open items',
    none_yet: 'Nothing yet',
    new_contact: 'New',
    open_link_gmail: 'Open in Gmail',
    open_link_outlook: 'Open in Outlook',
    emails_count: '{n} email(s)',
    last_seen: 'last {t}',
  },
};
const t = (k, vars = {}) => {
  let s = I18N[state.lang][k] || k;
  for (const [kk, v] of Object.entries(vars)) s = s.replace(`{${kk}}`, v);
  return s;
};

// ───────── utilities ─────────
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
function relTime(iso) {
  if (!iso) return '';
  const dt = new Date(iso);
  if (isNaN(dt)) return '';
  const diff = (Date.now() - dt.getTime()) / 1000;
  if (diff < 60) return state.lang === 'zh' ? '刚刚' : 'just now';
  if (diff < 3600) return state.lang === 'zh' ? `${Math.floor(diff/60)} 分钟前` : `${Math.floor(diff/60)} min ago`;
  if (diff < 86400) return state.lang === 'zh' ? `${Math.floor(diff/3600)} 小时前` : `${Math.floor(diff/3600)} h ago`;
  if (diff < 86400*30) return state.lang === 'zh' ? `${Math.floor(diff/86400)} 天前` : `${Math.floor(diff/86400)} d ago`;
  return dt.toLocaleDateString();
}
function applyI18n() {
  document.documentElement.lang = state.lang;
  document.querySelectorAll('[data-i18n]').forEach((el) => { el.textContent = t(el.dataset.i18n); });
  document.querySelectorAll('[data-i18n-html]').forEach((el) => { el.innerHTML = t(el.dataset.i18nHtml); });
  document.querySelectorAll('.lang-btn').forEach((b) => {
    const on = b.dataset.lang === state.lang;
    b.style.background = on ? '#111111' : 'transparent';
    b.style.color = on ? '#FFFFFF' : '#4A4A4A';
  });
}

function showToast(msg, kind = 'info') {
  const el = $('toast');
  el.textContent = msg;
  el.className = 'fixed top-600 right-600 px-500 py-400 rounded-pill shadow-lift max-w-md z-50 text-200 font-semibold backdrop-blur-xl';
  el.classList.add(kind === 'error' ? 'bg-pushpin-50' : 'bg-cosmicore', kind === 'error' ? 'text-pushpin-700' : 'text-mochimalist');
  el.classList.remove('hidden');
  setTimeout(() => el.classList.add('hidden'), 3500);
}
function showLoading(msg) {
  $('loadingText').textContent = msg || t('syncing');
  $('loading').classList.remove('hidden');
}
function hideLoading() {
  $('loading').classList.add('hidden');
}

async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body !== undefined) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const r = await fetch(path, opts);
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.detail || r.statusText);
  return data;
}

// ───────── data load + render ─────────
async function refreshAll() {
  const [me, contactsResp] = await Promise.all([
    api('GET', '/api/me'),
    api('GET', '/api/contacts'),
  ]);
  state.connections = me.connections;
  state.contacts = contactsResp.contacts;
  renderShell();
  renderConnBar();
  renderContactList();
  if (state.selectedId && !state.contacts.find((c) => c.id === state.selectedId)) {
    state.selectedId = null;
    delete state.detailCache[state.selectedId];
  }
  if (state.selectedId) await openContact(state.selectedId, { force: true });
}

function renderShell() {
  const anyConn = state.connections.length > 0;
  const anyContact = state.contacts.length > 0;
  const showMain = anyConn || anyContact;
  $('emptyState').classList.toggle('hidden', showMain);
  $('mainView').classList.toggle('hidden', !showMain);
  $('connectGoogle').style.display = anyConn ? '' : 'none';
  $('connectMicrosoft').style.display = anyConn ? '' : 'none';
}

function renderConnBar() {
  const bar = $('connBar');
  if (!state.connections.length) { bar.innerHTML = ''; return; }
  const chips = state.connections.map((c) => {
    const dot = c.provider === 'google'
      ? '<span class="w-200 h-200 rounded-pill bg-pushpin-450"></span>'
      : '<span class="w-200 h-200 rounded-pill bg-cosmicore"></span>';
    return `
      <div class="flex items-center gap-200 bg-mochimalist rounded-pill px-400 py-200 shadow-floating text-100">
        ${dot}
        <span class="font-semibold text-cosmicore">${escapeHtml(c.provider_email)}</span>
        <button data-act="sweep" data-id="${c.id}" class="px-300 py-100 rounded-pill bg-pushpin-450 text-mochimalist font-semibold hover:bg-pushpin-500 transition-colors">${escapeHtml(t('sync_now'))}</button>
        <button data-act="disconnect" data-id="${c.id}" class="px-200 text-roboflow-500 hover:text-pushpin-450 transition-colors" title="${escapeHtml(t('disconnect'))}">×</button>
      </div>`;
  }).join('');
  bar.innerHTML = chips;
}

function renderContactList() {
  const wrap = $('contactList');
  const empty = $('contactListEmpty');
  $('contactCount').textContent = t('emails_count', { n: state.contacts.length });
  if (!state.contacts.length) {
    wrap.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  wrap.innerHTML = state.contacts.map((c) => {
    const stage = c.relationship_stage || t('new_contact');
    const stageCls = `stage-${stage.replace(/\s+/g, '.')}`;
    const preview = c.current_topic || c.rolling_summary || '';
    const active = c.id === state.selectedId;
    return `
      <button class="contact-row w-full text-left px-400 py-400 rounded-400 hover:bg-roboflow-50 transition-colors duration-300 ease-apple"
              data-id="${c.id}" data-active="${active}">
        <div class="flex items-center justify-between gap-300">
          <div class="font-semibold truncate">${escapeHtml(c.name || c.email)}</div>
          <span class="stage-pill ${stageCls}">${escapeHtml(stage)}</span>
        </div>
        <div class="row-meta text-100 text-roboflow-500 mt-100 truncate">
          ${escapeHtml(c.email)}${c.company ? ' · ' + escapeHtml(c.company) : ''} · ${escapeHtml(t('last_seen', { t: relTime(c.last_seen_at) }))}
        </div>
        ${preview ? `<div class="row-preview text-100 text-roboflow-600 mt-200 line-clamp-2" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${escapeHtml(preview)}</div>` : ''}
      </button>`;
  }).join('');
}

function renderDetail(payload) {
  if (!payload) {
    $('detail').classList.add('hidden');
    $('selectHint').classList.remove('hidden');
    return;
  }
  $('selectHint').classList.add('hidden');
  $('detail').classList.remove('hidden');

  const { contact, emails } = payload;
  const stage = contact.relationship_stage || t('new_contact');
  const stageCls = `stage-${stage.replace(/\s+/g, '.')}`;
  const opens = (contact.open_action_items || '').split('\n').map((s) => s.trim()).filter(Boolean);
  const rolling = contact.rolling_summary || '';

  const timeline = emails.map((e) => {
    const dt = e.received_at ? new Date(e.received_at) : null;
    const when = dt && !isNaN(dt) ? dt.toLocaleString(state.lang === 'zh' ? 'zh-CN' : 'en-US', { dateStyle: 'medium', timeStyle: 'short' }) : '';
    return `
      <div class="border-l-2 border-roboflow-200 pl-500 pb-500 relative">
        <span class="absolute -left-[6px] top-200 w-300 h-300 rounded-pill bg-mochimalist border-2 border-pushpin-450"></span>
        <div class="flex items-baseline justify-between gap-300">
          <div class="text-100 text-roboflow-500 font-mono">${escapeHtml(when)}</div>
          <button data-act="delete-email" data-id="${e.id}" class="text-100 text-roboflow-400 hover:text-pushpin-450 transition-colors">${escapeHtml(t('delete_email'))}</button>
        </div>
        <div class="text-200 font-semibold text-cosmicore mt-100">${escapeHtml(e.subject || '(no subject)')}</div>
        <div class="text-200 text-roboflow-600 mt-200 leading-relaxed">${escapeHtml(e.summary || '')}</div>
        ${(e.action_items && e.action_items.trim() && e.action_items.trim() !== '无' && e.action_items.trim().toLowerCase() !== 'none')
          ? `<div class="text-100 text-pushpin-700 mt-300 whitespace-pre-line bg-pushpin-0 rounded-300 p-300">${escapeHtml(e.action_items)}</div>`
          : ''}
      </div>`;
  }).join('');

  $('detail').innerHTML = `
    <div class="bg-mochimalist rounded-600 shadow-lift p-700 animate-fadeUp" style="box-shadow: 0 4px 8px rgba(17,17,17,0.08), 0 24px 48px rgba(17,17,17,0.10), inset 0 0 0 1.5px rgba(230,0,35,0.18);">
      <div class="flex items-start justify-between gap-400 mb-500">
        <div>
          <div class="text-100 text-pushpin-450 tracking-widest uppercase font-semibold">${escapeHtml(t('dossier_h'))}</div>
          <h2 class="text-500 font-bold text-cosmicore mt-100">${escapeHtml(contact.name || contact.email)}</h2>
          <div class="text-200 text-roboflow-500 mt-100">${escapeHtml(contact.email)}${contact.company ? ' · ' + escapeHtml(contact.company) : ''} · ${escapeHtml(t('emails_count', { n: contact.total_emails }))}</div>
        </div>
        <div class="flex items-center gap-300">
          <span class="stage-pill ${stageCls}">${escapeHtml(stage)}</span>
          <button data-act="delete-contact" class="text-100 text-roboflow-400 hover:text-pushpin-450 transition-colors">${escapeHtml(t('delete_contact'))}</button>
        </div>
      </div>

      ${contact.current_topic ? `
        <div class="mb-500">
          <div class="text-100 text-roboflow-500 tracking-wide uppercase font-semibold mb-200">${escapeHtml(t('current_topic'))}</div>
          <div class="text-300 text-cosmicore font-semibold">${escapeHtml(contact.current_topic)}</div>
        </div>` : ''}

      <div class="mb-500">
        <div class="text-100 text-roboflow-500 tracking-wide uppercase font-semibold mb-200">${escapeHtml(t('rolling_summary'))}</div>
        <div class="text-200 text-roboflow-700 leading-relaxed">${rolling ? escapeHtml(rolling) : `<span class="text-roboflow-400">${escapeHtml(t('none_yet'))}</span>`}</div>
      </div>

      <div>
        <div class="text-100 text-roboflow-500 tracking-wide uppercase font-semibold mb-200">${escapeHtml(t('open_items'))}</div>
        ${opens.length
          ? `<ul class="space-y-200">${opens.map((o) => `<li class="text-200 text-cosmicore">${escapeHtml(o)}</li>`).join('')}</ul>`
          : `<div class="text-200 text-roboflow-400">${escapeHtml(t('none_yet'))}</div>`}
      </div>
    </div>

    <div class="bg-mochimalist rounded-600 shadow-floating p-700 animate-fadeUp">
      <div class="text-100 text-roboflow-500 tracking-widest uppercase font-semibold mb-500">${escapeHtml(t('timeline_h'))}</div>
      <div class="space-y-200">${timeline || `<div class="text-200 text-roboflow-400">${escapeHtml(t('none_yet'))}</div>`}</div>
    </div>
  `;
}

// ───────── interactions ─────────
async function openContact(id, opts = {}) {
  state.selectedId = id;
  renderContactList();
  if (!opts.force && state.detailCache[id]) {
    renderDetail(state.detailCache[id]);
    return;
  }
  try {
    const data = await api('GET', `/api/contacts/${id}`);
    state.detailCache[id] = data;
    renderDetail(data);
  } catch (e) {
    showToast(e.message || String(e), 'error');
  }
}

async function sweep(connId) {
  showLoading(t('syncing'));
  try {
    const data = await api('POST', `/api/inbox/${connId}/sweep`, { limit: 10, lang: state.lang });
    let msg = t('synced_n', { n: data.processed });
    if (data.skipped_duplicate) msg += t('skipped_n', { n: data.skipped_duplicate });
    if (data.failed && data.failed.length) msg += t('failed_n', { n: data.failed.length });
    if (!data.processed && !data.skipped_duplicate) msg = t('no_new');
    showToast(msg);
    // invalidate detail cache since dossiers may have updated
    state.detailCache = {};
    await refreshAll();
  } catch (e) {
    showToast(e.message || String(e), 'error');
  } finally {
    hideLoading();
  }
}

async function disconnect(connId) {
  if (!confirm(t('disconnect_confirm'))) return;
  try {
    await api('DELETE', `/api/inbox/${connId}`);
    await refreshAll();
  } catch (e) { showToast(e.message || String(e), 'error'); }
}

async function deleteContact(id) {
  if (!confirm(t('delete_contact_confirm'))) return;
  try {
    await api('DELETE', `/api/contacts/${id}`);
    state.selectedId = null;
    state.detailCache = {};
    renderDetail(null);
    await refreshAll();
  } catch (e) { showToast(e.message || String(e), 'error'); }
}

async function deleteEmail(id) {
  if (!confirm(t('delete_email_confirm'))) return;
  try {
    await api('DELETE', `/api/contact-emails/${id}`);
    delete state.detailCache[state.selectedId];
    await refreshAll();
  } catch (e) { showToast(e.message || String(e), 'error'); }
}

// ───────── wiring ─────────
function wire() {
  document.querySelectorAll('.lang-btn').forEach((b) => {
    b.addEventListener('click', () => {
      state.lang = b.dataset.lang;
      localStorage.setItem('lang', state.lang);
      applyI18n();
      renderConnBar();
      renderContactList();
      if (state.selectedId && state.detailCache[state.selectedId]) renderDetail(state.detailCache[state.selectedId]);
    });
  });

  const goGoogle = () => { window.location.href = '/api/auth/google/start'; };
  const goMs     = () => { window.location.href = '/api/auth/microsoft/start'; };
  $('connectGoogle').addEventListener('click', goGoogle);
  $('connectMicrosoft').addEventListener('click', goMs);
  document.querySelectorAll('.hero-google').forEach((b) => b.addEventListener('click', goGoogle));
  document.querySelectorAll('.hero-microsoft').forEach((b) => b.addEventListener('click', goMs));

  $('connBar').addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-act]');
    if (!btn) return;
    const id = +btn.dataset.id;
    if (btn.dataset.act === 'sweep') sweep(id);
    if (btn.dataset.act === 'disconnect') disconnect(id);
  });

  $('contactList').addEventListener('click', (e) => {
    const row = e.target.closest('.contact-row');
    if (!row) return;
    openContact(+row.dataset.id);
  });

  $('detail').addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-act]');
    if (!btn) return;
    if (btn.dataset.act === 'delete-contact' && state.selectedId) deleteContact(state.selectedId);
    if (btn.dataset.act === 'delete-email')   deleteEmail(+btn.dataset.id);
  });

  // banner from OAuth callback
  const params = new URLSearchParams(window.location.search);
  if (params.get('connected')) {
    showToast(state.lang === 'zh' ? '邮箱已连接' : 'Inbox connected');
    history.replaceState({}, '', window.location.pathname);
  } else if (params.get('oauth_error')) {
    showToast(`OAuth: ${params.get('oauth_error')}`, 'error');
    history.replaceState({}, '', window.location.pathname);
  }
}

// ───────── init ─────────
applyI18n();
wire();
refreshAll().catch((e) => showToast(e.message || String(e), 'error'));
</script>
</body>
</html>
